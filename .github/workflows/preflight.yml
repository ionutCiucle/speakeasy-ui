name: Preflight

on:
  pull_request:
    branches:
      - main

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run ts:check

      - name: Lint
        run: npm run lint:check
