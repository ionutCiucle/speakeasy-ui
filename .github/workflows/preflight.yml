name: Preflight

on:
  pull_request:
    branches:
      - main

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run ts:check

      - name: Lint
        run: npm run lint:check

      - name: Test
        run: npm test
